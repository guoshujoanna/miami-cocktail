<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Miami Cocktail — 帮我调一杯</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--sun:#F5A623;--sky:#5BB8F5;--pink:#FF6B9D;--cream:#FFFDF7;--sand:#FFF3E0;--ink:#2C2C2C;--mist:#8A8A8A;--card:#FFFFFF;}
body{background:var(--cream);font-family:'Georgia',serif;min-height:100vh;}
#app{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:2.5rem 1.5rem;position:relative;overflow:hidden;}
.blob{position:absolute;border-radius:50%;filter:blur(60px);opacity:0.18;pointer-events:none;animation:fb 8s ease-in-out infinite;}
.b1{width:300px;height:300px;background:var(--sun);top:-80px;right:-60px;}
.b2{width:250px;height:250px;background:var(--sky);bottom:-60px;left:-80px;animation-delay:3s;}
.b3{width:180px;height:180px;background:var(--pink);top:40%;left:60%;animation-delay:5s;}
@keyframes fb{0%,100%{transform:translateY(0)}50%{transform:translateY(-20px)}}
.palm{position:absolute;font-size:48px;opacity:0.12;pointer-events:none;}
.p1{top:10px;left:10px;animation:sw1 6s ease-in-out infinite;}
.p2{top:20px;right:20px;animation:sw2 6s ease-in-out infinite;}
@keyframes sw1{0%,100%{transform:rotate(-5deg)}50%{transform:rotate(5deg)}}
@keyframes sw2{0%,100%{transform:scaleX(-1) rotate(-5deg)}50%{transform:scaleX(-1) rotate(5deg)}}
.screen{width:100%;max-width:520px;display:flex;flex-direction:column;align-items:center;text-align:center;position:relative;z-index:2;animation:fi 0.9s ease both;}
@keyframes fi{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
.gi{font-size:56px;margin-bottom:1rem;animation:flt 4s ease-in-out infinite;}
@keyframes flt{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
.ey{font-family:sans-serif;font-size:11px;letter-spacing:3px;color:var(--sky);margin-bottom:1.2rem;text-transform:uppercase;}
.hl{font-size:30px;color:var(--ink);line-height:1.4;margin-bottom:0.8rem;font-weight:400;}
.hl span{color:var(--sun);}
.sl{font-family:sans-serif;font-size:13px;color:var(--mist);margin-bottom:1.5rem;line-height:1.7;}
#ii{width:100%;background:var(--card);border:1.5px solid #E8E0D0;border-radius:16px;padding:16px 20px;font-size:15px;font-family:'Georgia',serif;color:var(--ink);outline:none;transition:border-color 0.3s;margin-bottom:1rem;}
#ii::placeholder{color:#C5BFB5;font-style:italic;}
#ii:focus{border-color:var(--sun);box-shadow:0 0 0 3px rgba(245,166,35,0.1);}
.mr{display:flex;gap:8px;flex-wrap:wrap;justify-content:center;margin-bottom:1.5rem;}
.mt{background:var(--sand);border:1px solid #EED9B5;border-radius:20px;padding:7px 16px;font-size:12px;font-family:sans-serif;color:var(--mist);cursor:pointer;transition:all 0.2s;}
.mt:hover,.mt.on{background:var(--sun);color:#fff;border-color:var(--sun);}
.bm{background:linear-gradient(135deg,var(--sun),var(--pink));border:none;border-radius:50px;padding:14px 48px;font-size:14px;font-family:sans-serif;letter-spacing:1.5px;color:#fff;cursor:pointer;transition:transform 0.2s;box-shadow:0 4px 20px rgba(245,166,35,0.3);}
.bm:hover{transform:translateY(-2px);}
.bg{background:transparent;border:1.5px solid #E0D8CE;border-radius:50px;padding:10px 28px;font-size:12px;font-family:sans-serif;color:var(--mist);cursor:pointer;transition:all 0.2s;margin-top:10px;}
.bg:hover{border-color:var(--sun);color:var(--sun);}
.lw{display:flex;flex-direction:column;align-items:center;gap:1.5rem;}
.sk{font-size:52px;animation:sk 0.6s ease-in-out infinite;}
@keyframes sk{0%,100%{transform:rotate(-12deg)}50%{transform:rotate(12deg)}}
.lt{font-size:18px;color:var(--ink);}
.ld span{animation:bl 1.4s infinite;display:inline-block;}
.ld span:nth-child(2){animation-delay:0.2s;}
.ld span:nth-child(3){animation-delay:0.4s;}
@keyframes bl{0%,80%,100%{opacity:0}40%{opacity:1}}
.rc{background:var(--card);border-radius:24px;padding:2rem;width:100%;box-shadow:0 8px 40px rgba(0,0,0,0.06);border:1px solid #F0E8DC;margin-bottom:1.5rem;text-align:left;}
.cb{display:inline-block;background:#FFF0F8;border:1px solid #FFB3D4;border-radius:20px;padding:4px 14px;font-size:11px;font-family:sans-serif;color:var(--pink);margin-bottom:0.8rem;}
.rt{display:inline-block;background:var(--sand);border-radius:20px;padding:4px 14px;font-size:11px;font-family:sans-serif;color:var(--sun);margin-bottom:0.8rem;}
.di{font-size:48px;float:right;margin:-0.5rem -0.5rem 0 1rem;animation:flt 4s ease-in-out infinite;}
.dn{font-size:22px;color:var(--ink);margin-bottom:0.4rem;line-height:1.3;}
.dd{font-family:sans-serif;font-size:13.5px;color:var(--mist);line-height:1.8;margin-bottom:1rem;}
.ft{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:1rem;}
.ftag{background:#F0FBF5;border:1px solid #B8E8CC;border-radius:12px;padding:3px 10px;font-size:11px;font-family:sans-serif;color:#2E7D52;}
.dv{height:1px;background:linear-gradient(90deg,transparent,#E8E0D0,transparent);margin:1rem 0;}
.rtt{font-family:sans-serif;font-size:10px;letter-spacing:2px;color:#C5BFB5;margin-bottom:0.7rem;text-transform:uppercase;}
.rl{list-style:none;display:flex;flex-direction:column;gap:6px;margin-bottom:1.2rem;}
.rl li{font-family:sans-serif;font-size:13px;color:var(--ink);display:flex;align-items:center;gap:8px;}
.rl li::before{content:'';width:6px;height:6px;border-radius:50%;background:var(--sun);flex-shrink:0;}
.mb{background:var(--sand);border-radius:12px;padding:1rem 1.2rem;}
.mb p{font-family:sans-serif;font-size:13px;color:var(--mist);line-height:2;}
.ar{display:flex;gap:10px;flex-wrap:wrap;justify-content:center;width:100%;}
.ab{background:var(--card);border:1.5px solid #E8E0D0;border-radius:50px;padding:10px 22px;font-size:12px;font-family:sans-serif;color:var(--mist);cursor:pointer;transition:all 0.2s;}
.ab:hover{border-color:var(--pink);color:var(--pink);}
.ch{font-family:sans-serif;font-size:12px;color:var(--pink);margin-bottom:0.8rem;line-height:1.6;}
</style>
</head>
<body>
<div id="app">
  <div class="blob b1"></div><div class="blob b2"></div><div class="blob b3"></div>
  <div class="palm p1">🌴</div><div class="palm p2">🌴</div>

  <div id="si" class="screen">
    <div class="gi">🍹</div>
    <p class="ey">Miami Afternoon</p>
    <h1 class="hl">今天，有点<span>热</span><br>要不要调一杯？</h1>
    <p class="sl">看看你手边有什么 — 任何东西都可以写</p>
    <input id="ii" type="text" placeholder="伏特加、柠檬、榴莲、坚果… 随便写">
    <div class="mr">
      <span class="mt" onclick="tm(this,'清爽')">清爽</span>
      <span class="mt" onclick="tm(this,'甜一点')">甜一点</span>
      <span class="mt" onclick="tm(this,'微醺就好')">微醺就好</span>
      <span class="mt" onclick="tm(this,'强一点')">强一点</span>
      <span class="mt" onclick="tm(this,'无酒精')">无酒精</span>
      <span class="mt" onclick="tm(this,'创意模式')">🎲 创意模式</span>
    </div>
    <button class="bm" onclick="gen()">帮我想一杯 ✦</button>
  </div>

  <div id="sl2" class="screen" style="display:none">
    <div class="lw">
      <div class="sk">🍸</div>
      <p class="lt">正在帮你想一杯<span class="ld"><span>.</span><span>.</span><span>.</span></span></p>
      <p class="sl">用你手边的材料</p>
    </div>
  </div>

  <div id="sr" class="screen" style="display:none">
    <p style="font-family:sans-serif;font-size:13px;color:var(--mist);margin-bottom:1rem;">这杯，应该很适合现在的你</p>
    <div class="rc">
      <div id="bd"></div>
      <div class="di" id="ri">🍋</div>
      <h2 class="dn" id="rn"></h2>
      <p class="dd" id="rd"></p>
      <div class="ft" id="rf"></div>
      <div class="dv"></div>
      <p class="rtt">配方</p>
      <ul class="rl" id="rr"></ul>
      <div class="mb"><p id="rm"></p></div>
    </div>
    <div class="ar">
      <button class="ab" onclick="gen()">再试一杯 ↺</button>
      <button class="ab" onclick="smg('甜一点')">今天想甜一点 🍓</button>
      <button class="ab" onclick="smg('创意模式')">换个惊喜 🎲</button>
      <button class="ab" onclick="gb()">换个材料</button>
    </div>
  </div>
</div>
<script>
const FM={酸:['柠檬','青柠','lime','lemon','醋','酸','tamarind'],甜:['草莓','strawberry','芒果','mango','菠萝','pineapple','香蕉','banana','桃子','peach','荔枝','lychee','椰子','coconut','蜂蜜','honey','糖','sugar','枫糖','焦糖','龙眼','榴莲','百香果','passion'],苦:['苦','金巴利','campari','咖啡','coffee','可可','葡萄柚','grapefruit','西柚'],草本:['薄荷','mint','罗勒','basil','迷迭香','rosemary','百里香','thyme','黄瓜','cucumber','芹菜','折耳根','香菜','鱼腥草'],辛辣:['姜','ginger','辣椒','chili','胡椒','pepper','肉桂','花椒','辣','jalapeño'],坚果:['坚果','nut','杏仁','almond','花生','peanut','腰果','核桃','walnut','榛子','hazelnut','椰子'],花香:['玫瑰','rose','接骨木','elderflower','紫罗兰','茉莉','薰衣草','lavender','洛神花','hibiscus'],烟熏:['梅斯卡尔','mezcal','泥煤','peat','威士忌','whisky'],热带:['椰子','coconut','芒果','mango','菠萝','pineapple','百香果','木瓜','番石榴','火龙果','荔枝'],发酵:['泡菜','kimchi','酸菜','康普茶','kombucha','味噌','纳豆','醋']};

{icon:'🍉',name:'Watermelon Cooler',fl:['甜','清爽'],keys:['伏特加','vodka','西瓜','watermelon'],desc:'夏天最红的颜色\n凉的，甜的',recipe:['伏特加 45ml','西瓜汁 90ml','青柠汁 15ml','薄荷','冰'],method:'西瓜榨汁过滤\n全部加冰摇匀\n薄荷装饰'},

let moods=[],last=null;

function tm(el,m){el.classList.toggle('on');moods=el.classList.contains('on')?[...moods,m]:moods.filter(x=>x!==m);}
function smg(m){moods=[m];document.querySelectorAll('.mt').forEach(t=>t.classList.toggle('on',t.textContent.includes(m)));gen();}
function show(id){['si','sl2','sr'].forEach(s=>document.getElementById(s).style.display='none');document.getElementById(id).style.display='flex';window.scrollTo(0,0);}
function dfl(inp){const f=new Set();const s=inp.toLowerCase();for(const[k,ws]of Object.entries(FM)){if(ws.some(w=>s.includes(w.toLowerCase())))f.add(k);}return[...f];}

function gen(){
  const inp=document.getElementById('ii').value.toLowerCase().trim();
  show('sl2');
  setTimeout(()=>{
    let pick=null,isC=false,hint='';
    if(moods.includes('创意模式')){pick=CREATIVE[Math.floor(Math.random()*CREATIVE.length)];isC=true;}
    else{
      for(const[w,g]of Object.entries(CG)){
        if(inp.includes(w)){hint=g.hint;pick=DB.find(r=>r.name===g.rec)||null;isC=true;break;}
      }
      if(!pick){
        const sc=[];
        for(const r of DB){
          let s=0;
          for(const k of r.keys){if(inp.includes(k.toLowerCase()))s+=2;}
          const ifl=dfl(inp);
          for(const f of ifl){if(r.fl.includes(f))s++;}
          if(moods.includes('清爽')&&r.fl.includes('清爽'))s+=2;
          if(moods.includes('甜一点')&&r.fl.includes('甜'))s+=2;
          if(moods.includes('强一点')&&(r.keys.includes('龙舌兰')||r.keys.includes('威士忌')||r.keys.includes('梅斯卡尔')))s+=2;
          if(moods.includes('微醺就好')&&(r.keys.includes('气泡')||r.keys.includes('prosecco')))s+=2;
          if(moods.includes('无酒精')&&r.keys.includes('无酒精'))s+=5;
          if(s>0)sc.push({r,s});
        }
        sc.sort((a,b)=>b.s-a.s);
        if(sc.length>0){
          const top=sc.filter(m=>m.s===sc[0].s);
          pick=top[Math.floor(Math.random()*top.length)].r;
          if(pick===last&&top.length>1)pick=top[(top.indexOf(top.find(t=>t.r===last))+1)%top.length].r;
        }
      }
      if(!pick){pick=CREATIVE[Math.floor(Math.random()*CREATIVE.length)];isC=true;hint='没有完全一样的，但可以试试这个感觉';}
    }
    last=pick;
    const bd=document.getElementById('bd');
    bd.innerHTML=isC?'<div class="cb">✦ 创意推荐</div>':'<div class="rt">TODAY\'S PICK</div>';
    if(hint)bd.innerHTML+=`<p class="ch">${hint}</p>`;
    document.getElementById('ri').textContent=pick.icon;
    document.getElementById('rn').textContent=pick.name;
    document.getElementById('rd').innerHTML=pick.desc.replace(/\n/g,'<br>');
    const ft=document.getElementById('rf');ft.innerHTML='';
    if(pick.fl)pick.fl.forEach(f=>{const s=document.createElement('span');s.className='ftag';s.textContent=f;ft.appendChild(s);});
    const ul=document.getElementById('rr');ul.innerHTML='';
    pick.recipe.forEach(i=>{const li=document.createElement('li');li.textContent=i;ul.appendChild(li);});
    document.getElementById('rm').innerHTML=pick.method.replace(/\n/g,'<br>');
    show('sr');
  },2200);
}
function gb(){show('si');}
document.getElementById('ii').addEventListener('keydown',e=>{if(e.key==='Enter')gen();});
